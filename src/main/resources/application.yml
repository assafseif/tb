spring:
  application:
    name: ai-news-futures-trading-bot

  datasource:
    url: jdbc:sqlserver://${DB_HOST:109.205.180.47}:${DB_PORT:1433};databaseName=${DB_NAME:tradingbot};encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:TradingBot@123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto:  create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8082
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Trading Configuration
trading:
  enabled: ${TRADING_ENABLED:true}
  # When true, stop loss and take profit use very small distances (for quick testing)
  testing-mode: false

paper-trading:
  enabled: ${PAPER_TRADING_ENABLED:false}

# Binance Configuration
binance:
  api-key: ${BINANCE_API_KEY:HMPGDGf477xVHQ1zy1jbb3cnA2nerJwmSin2edR7FGST9t8x2h3dqiH1yMNtMK88}
  api-secret: ${BINANCE_API_SECRET:XInUSmbcYHNL1aTCH158qiOmmpwTxdNKk0nkYdTDVbbKJ7K5p7P8NYtjKpz1KuDl}
  testnet-base-url: https://testnet.binancefuture.com
  live-base-url: https://fapi.binance.com
  use-testnet: true
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
  recv-window: 5000
  kline-limit: 200

# AI Configuration
ai:
  base-url: ${AI_BASE_URL:http://localhost:8889}
  generate-path: /generate
  timeout-seconds: 30
  retry-attempts: 3

# News Configuration
news:
  # CryptoCompare v1 is free without auth; set api-key to use v2 (larger limit)
  cryptocompare-url: https://min-api.cryptocompare.com/data/news/
  cryptocompare-api-key: ${CRYPTOCOMPARE_API_KEY:}
  categories: BTC,ETH,Altcoin,Trading,Blockchain
  max-age-minutes: ${NEWS_MAX_AGE_MINUTES:240}
  max-per-cycle: ${NEWS_MAX_PER_CYCLE:10}
  # RSS feeds require no API key
  rss-feeds:
    - https://cointelegraph.com/rss
    - https://decrypt.co/feed
    - https://cryptonews.com/news/feed/
    - https://beincrypto.com/feed/
    - https://cryptopotato.com/feed/

# Risk Management
risk:
  # max-risk-per-trade: ${RISK_MAX_PER_TRADE:0.05}    # 10% per trade (testing)
  # max-daily-loss: ${RISK_MAX_DAILY_LOSS:0.80}        # 80% daily loss cap (testing)
  # max-open-trades: ${RISK_MAX_OPEN_TRADES:20}
  # minimum-confidence: ${RISK_MIN_CONFIDENCE:5}       # accept almost any signal (testing)

  max-risk-per-trade: ${RISK_MAX_PER_TRADE:0.01}
  max-daily-loss: ${RISK_MAX_DAILY_LOSS:0.03}
  max-open-trades: ${RISK_MAX_OPEN_TRADES:10}
  minimum-confidence: ${RISK_MIN_CONFIDENCE:50}

# Scoring Engine
scoring:
  weights:
    sentiment: 0.40
    trend: 0.25
    volume: 0.15
    rsi: 0.20
  buy-threshold: 55.0    # lowered for testing — any mild uptrend triggers
  sell-threshold: 45.0   # lowered for testing — any mild downtrend triggers

account:
  leverage: 1

logging:
  level:
    com.tradingbot: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
